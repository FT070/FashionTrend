<!DOCTYPE html>
<html>
<head>
  <title>Fashion Trend</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    header {
      background: black;
      color: white;
      padding: 25px;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      border-radius: 10px;
      width: 220px;
      padding: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      background: black;
      color: white;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>Fashion Trend 👗</h1>
  <p>თანამედროვე ტანსაცმლის მაღაზია</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="clothes">
    <h3>სტილური ლუქი</h3>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd49" alt="fashion">
    <h3>ახალი კოლექცია</h3>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b" alt="style">
    <h3>ყოველდღიური სტილი</h3>
  </div>

</div>

<footer>
  <p>📞 კონტაქტი: 593111249</p>
</footer>

</body>
</html>
